version: 2

sources:
  - name: adventure_works
    description: "Raw relational database of the Adventure Works ERP, extracted directly to the data platform."
    database: fea_academy
    schema: adventure_works
    tables:
      - name: sales_salesorderheader
        description: "Raw header data for sales orders, containing status, dates, and customer keys."
        columns:
          - name: salesorderid
            tests:
              - unique
              - not_null

      - name: sales_salesorderdetail
        description: "Line item details for sales orders, containing quantities, prices, and product keys."
        columns:
          - name: salesorderdetailid
            tests:
              - unique
              - not_null

      - name: sales_customer
        description: "Raw customer master record, linking people, stores (B2B), and territories."
        columns:
          - name: customerid
            tests:
              - unique
              - not_null

      - name: sales_salesreason
        description: "Lookup table with descriptive reasons associated with sales."
        columns:
          - name: salesreasonid
            tests:
              - unique
              - not_null

      - name: sales_salesorderheadersalesreason
        description: "Bridge table (many-to-many) associating each sales order with its respective reasons."

      - name: person_address
        description: "Raw physical address data, including cities, postal codes, and state keys."
        columns:
          - name: addressid
            tests:
              - unique
              - not_null

      - name: person_stateprovince
        description: "State and province records linked to region/country codes."
        columns:
          - name: stateprovinceid
            tests:
              - unique
              - not_null

      - name: person_countryregion
        description: "Lookup table containing the names and codes of countries and regions."
        columns:
          - name: countryregioncode


      - name: production_product
        description: "Master product record, containing costs, list prices, and subcategories."
        columns:
          - name: productid
            tests:
              - unique
              - not_null

      - name: sales_creditcard
        description: "Raw information on credit cards used in financial transactions."
        columns:
          - name: creditcardid
            tests:
              - unique
              - not_null

      - name: sales_store
        description: "Registration information for physical stores and corporate customers (B2B segment)."
        columns:
          - name: businessentityid
            tests:
              - unique
              - not_null

      - name: person_person
        description: "Registration data for individuals (individual customers, employees, and store contacts)."
        columns:
          - name: businessentityid
            tests:
              - unique
              - not_null

      - name: production_productsubcategory
        description: "Product subcategories linking items to main categories."
        columns:
          - name: productsubcategoryid
            tests:
              - unique
              - not_null

      - name: production_productcategory
        description: "Macro-level categories of the organization's products."
        columns:
          - name: productcategoryid
            tests:
              - unique
              - not_null