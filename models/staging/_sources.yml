version: 2

sources:
  - name: adventure_works
    description: "Raw relational database of the Adventure Works ERP."
    database: fea_academy
    schema: adventure_works
    tables:
      - name: sales_salesorderheader
        description: "Raw header data for sales orders."
        columns:
          - name: salesorderid
            description: "Unique identifier for the sales order."
            tests:
              - unique
              - not_null
      - name: sales_salesorderdetail
        description: "Line item details for sales orders."
        columns:
          - name: salesorderdetailid
            description: "Unique identifier for the sales order detail line."
            tests:
              - unique
              - not_null
      - name: sales_customer
        description: "Raw customer master record."
        columns:
          - name: customerid
            description: "Unique identifier for the customer."
            tests:
              - unique
              - not_null
      - name: sales_salesreason
        description: "Lookup table with descriptive reasons."
        columns:
          - name: salesreasonid
            description: "Unique identifier for the sales reason."
            tests:
              - unique
              - not_null
      - name: sales_salesorderheadersalesreason
        description: "Bridge table (many-to-many) associating orders with reasons."
        columns:
          - name: salesorderid
            description: "Identifier referencing the sales order."
            tests:
              - not_null
          - name: salesreasonid
            description: "Identifier referencing the sales reason."
            tests:
              - not_null
      - name: person_address
        description: "Raw physical address data."
        columns:
          - name: addressid
            description: "Unique identifier for the physical address."
            tests:
              - unique
              - not_null
      - name: person_stateprovince
        description: "State and province records."
        columns:
          - name: stateprovinceid
            description: "Unique identifier for the state or province."
            tests:
              - unique
              - not_null
      - name: person_countryregion
        description: "Lookup table for countries."
        columns:
          - name: countryregioncode
            description: "Unique identifier for the country or region."
            tests:
              - unique
      - name: production_product
        description: "Master product record."
        columns:
          - name: productid
            description: "Unique identifier for the product."
            tests:
              - unique
              - not_null
      - name: sales_creditcard
        description: "Raw credit card info."
        columns:
          - name: creditcardid
            description: "Unique identifier for the credit card."
            tests:
              - unique
              - not_null
      - name: sales_store
        description: "Physical store records."
        columns:
          - name: businessentityid
            description: "Unique identifier representing the store's business entity."
            tests:
              - unique
              - not_null
      - name: person_person
        description: "Individual registration data."
        columns:
          - name: businessentityid
            description: "Unique identifier representing the individual's business entity."
            tests:
              - unique
              - not_null
      - name: production_productsubcategory
        description: "Product subcategories."
        columns:
          - name: productsubcategoryid
            description: "Unique identifier for the product subcategory."
            tests:
              - unique
              - not_null
      - name: production_productcategory
        description: "Macro-level product categories."
        columns:
          - name: productcategoryid
            description: "Unique identifier for the product category."
            tests:
              - unique
              - not_null