version: 2

models:
  - name: fact_sales
    description: "Core fact table containing keys, status, quantities, and calculated financial values for sales at the item level."
    columns:
      - name: sk_sales_order_item
        description: "Surrogate key generated via MD5 to uniquely identify each item line in the fact table."
        tests:
          - unique
          - not_null
      - name: sales_order_id
        description: "Identifier for the sales order."
      - name: address_id
        description: "Identifier for the shipping address."
        tests:
          - relationships:
              to: ref('dim_locations')
              field: address_id
      - name: customer_id
        description: "Identifier for the customer."
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        description: "Identifier for the product sold."
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: credit_card_id
        description: "Identifier for the credit card used in the transaction."
        tests:
          - relationships:
              to: ref('dim_creditcards')
              field: credit_card_id
      - name: gross_revenue
        description: "Total gross revenue generated by the item line (quantity * unit price)."
      - name: net_revenue
        description: "Total net revenue after discounts."

  - name: dim_customers
    description: "Final dimension model exposed to the business, containing cleaned and compiled customer profiles."
    columns:
      - name: customer_id
        description: "The unique primary key for the customer dimension."
        tests:
          - unique
          - not_null
      - name: customer_type
        description: "Categorization of the customer (Individual or Store)."
        tests:
          - accepted_values:
              values: ['Individual', 'Store']

  - name: dim_reasons
    description: "Dimension model containing available sales reasons."
    columns:
      - name: sales_reason_id
        description: "Primary key for the sales reason."
        tests:
          - unique
          - not_null

  - name: dim_creditcards
    description: "Dimension model containing credit card types."
    columns:
      - name: credit_card_id
        description: "Primary key for the credit card."
        tests:
          - unique
          - not_null

  - name: bridge_sales_reason
    description: "Bridge model linking sales orders to sales reasons, resolving the many-to-many relationship."
    columns:
      - name: sales_order_id
        description: "Foreign key referencing the sales order."
        tests:
          - not_null
      - name: sales_reason_id
        description: "Foreign key referencing the sales reason."
        tests:
          - not_null