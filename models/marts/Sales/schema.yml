version: 2

models:
  - name: fact_sales
    description: "Core fact table containing keys, status, quantities, and calculated financial values for sales."
    columns:
      - name: sk_sales_order_item
        description: "Surrogate key generated via MD5 to uniquely identify each item line in the fact table."
        tests:
          - unique
          - not_null

  - name: dim_customers
    description: "Final dimension model exposed to the business, containing cleaned and compiled customer profiles."
    columns:
      - name: customer_id
        description: "The unique primary key for the customer dimension."
        tests:
          - unique
          - not_null

  - name: dim_reasons
    description: "Dimension model containing available sales reasons."
    columns:
      - name: pk_sales_reason
        description: "Primary key for sales reason."
        tests:
          - unique
          - not_null

  - name: bridge_sales_reason
    description: "Bridge model linking sales orders to sales reasons, resolving the many-to-many relationship."
    columns:
      - name: sales_order_id
        description: "Foreign key referencing the sales order."
        tests:
          - not_null
      - name: sales_reason_id
        description: "Foreign key referencing the sales reason."
        tests:
          - not_null

